<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vvisdom Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap');

*,
*::before,
*::after{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#000000;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    font-family:'Jost',sans-serif;
}

.scene{
    width:100%;
    max-width:1200px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
}

.card{
    width:min(100%, 575px);
    aspect-ratio:575 / 250;
    min-height:220px;
    position:relative;
    overflow:hidden;
    border-radius:8px;
    box-shadow:
        0 16px 48px rgba(0,0,0,0.45),
        0 3px 12px rgba(0,0,0,0.3);
}

.card-front{
    background:#0b1120;
}

.card-back{
    background:#0d1420;
}

.card::before,
.card::after{
    content:'';
    position:absolute;
    width:24px;
    height:24px;
}

.card::before{
    top:16px;
    left:16px;
    border-top:1px solid #b8934a;
    border-left:1px solid #b8934a;
    opacity:0.7;
}

.card::after{
    bottom:16px;
    right:16px;
    border-bottom:1px solid #b8934a;
    border-right:1px solid #b8934a;
    opacity:0.7;
}

.card-bg{
    position:absolute;
    inset:0;
}

.card-front .card-bg{
    background:
        radial-gradient(ellipse 60% 40% at 85% 110%,rgba(184,147,74,0.08) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at -10% -10%,rgba(100,120,180,0.06) 0%,transparent 50%);
}

.card-back .card-bg{
    background:
        radial-gradient(ellipse 50% 50% at 15% 85%,rgba(184,147,74,0.06) 0%,transparent 55%);
}

.inner{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:clamp(18px,4vw,30px);
}

.name{
    font-family:'Cormorant Garant',serif;
    font-weight:300;
    font-size:clamp(2rem,5vw,2.5rem);
    letter-spacing:0.03em;
    color:#f0e8d5;
    line-height:1;
    margin-bottom:5px;
}

.brand{
    font-family:'Cormorant Garant',serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(1.1rem,3vw,1.25rem);
    color:#b8934a;
    letter-spacing:0.02em;
    margin-bottom:10px;
}

.gold-rule{
    width:32px;
    height:1px;
    background:#b8934a;
    margin-bottom:10px;
    opacity:0.8;
}

.tagline{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:clamp(0.72rem,2vw,0.95rem);
    color:#8a8fa8;
    letter-spacing:0.14em;
    text-transform:uppercase;
    line-height:1.5;
    margin-bottom:6px;
}

.services{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:clamp(0.62rem,1.8vw,0.82rem);
    color:#c0c8dc;
    letter-spacing:0.1em;
    text-transform:uppercase;
    line-height:1.7;
}

.dot{
    color:#b8934a;
    margin:0 6px;
    opacity:0.7;
}

.card-back .inner{
    gap:0;
}

.crow{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:8px 0;
}

.crow:last-of-type{
    padding-bottom:4px;
}

.clabel{
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:10px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:#b8934a;
    min-width:58px;
}

.cval{
    font-family:'Jost',sans-serif;
    font-weight:300;
    font-size:clamp(0.8rem,2vw,0.95rem);
    color:#c0c8dc;
    line-height:1.4;
    word-break:break-word;
}

.cval.it{
    font-family:'Cormorant Garant',serif;
    font-style:italic;
    font-weight:400;
    color:#8fa3be;
    text-decoration:none;
    transition:0.2s ease;
}

.cval.it:hover{
    color:#b8934a;
}

.back-brand{
    font-family:'Cormorant Garant',serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(0.95rem,2vw,1.1rem);
    color:#b8934a;
    text-align:right;
    margin-top:6px;
    letter-spacing:0.02em;
}

@media (max-width:640px){

    body{
        padding:14px;
    }

    .scene{
        gap:20px;
    }

    .card-front .inner{
        justify-content:flex-start;
        padding-top:52px;
    }

    .card-back .inner{
        justify-content:flex-start;
        padding-top:34px;
        padding-bottom:20px;
    }

    .crow{
        flex-direction:column;
        gap:4px;
    }

    .clabel{
        min-width:auto;
    }

    .back-brand{
        text-align:left;
    }
}
</style>
</head>

<body>

<div class="scene">

    <div class="card card-front">
        <div class="card-bg"></div>

        <div class="inner">
            <div class="name">Advaith Vadlakonda</div>

            <div class="brand">Vvisdom Tutoring</div>

            <div class="gold-rule"></div>

            <div class="tagline">
                Improve your scores with nationally ranked tutors
            </div>

            <div class="services">
                SAT / ACT / PSAT Prep
                <span class="dot">·</span>
                Math Enrichment
                <span class="dot">·</span>
                Academic Writing
            </div>
        </div>
    </div>

    <div class="card card-back">
        <div class="card-bg"></div>

        <div class="inner">

            <div class="crow">
                <span class="clabel">Phone</span>
                <span class="cval">205-569-2349</span>
            </div>

            <div class="crow">
                <span class="clabel">Email</span>
                <span class="cval">agvadlakonda@gmail.com</span>
            </div>

            <div class="crow">
                <span class="clabel">Book</span>

                <a class="cval it"
                   href="https://calendly.com/agvadlakonda/20-min-meeting"
                   target="_blank">
                   calendly.com/agvadlakonda/20-min-meeting
                </a>
            </div>

            <div class="back-brand">
                Vvisdom Tutoring
            </div>

        </div>
    </div>

</div>

</body>
</html>
